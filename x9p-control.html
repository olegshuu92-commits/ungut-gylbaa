    html, body { margin: 0; padding: 0; }

    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #F5F0E6; z-index: 100; transition: opacity .4s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 32px; height: 32px; border: 1.5px solid #E5DDD0; border-top-color: #B89A6E; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .field { display: block; margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #8B7A5E; margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px 12px; border: 1px solid #E5DDD0; background: white;
      font-family: 'Inter'; font-size: 14px; color: #1F1F1F; border-radius: 4px; transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: #B89A6E; }
    .field textarea { min-height: 80px; resize: vertical; }
    @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .toast { animation: toast-in 0.3s ease; }
    @keyframes pulse-save { 0%, 100% { box-shadow: 0 0 0 0 rgba(184, 154, 110, 0.7); } 50% { box-shadow: 0 0 0 8px rgba(184, 154, 110, 0); } }
    .pulse-unsaved { animation: pulse-save 2s ease-in-out infinite; }
    .unread-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #B89A6E; margin-right: 8px; }
